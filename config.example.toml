[meshcore]
host = "0.0.0.0"
port = 5000
channel_name = "#lightning"
channel_key = ""
channel_slot = 0
always_configure_channel = true
connect_timeout_seconds = 10.0

[sensor]
i2c_bus = 1
i2c_address = "auto"
indoor = true
noise_floor = 2
watchdog_threshold = 1
spike_rejection = 2
minimum_lightnings = 1
mask_disturbers = true
reset_defaults_on_start = false
calibrate_on_start = true
clear_statistics_on_start = true
poll_interval_seconds = 0.1

[alerts]
cooldown_seconds = 60
send_noise_messages = false
send_disturber_messages = false
message_prefix = "AS3935"
lightning_message_template = "lightning detected at {time} | distance={distance} | energy={energy}"

[logging]
level = "INFO"
